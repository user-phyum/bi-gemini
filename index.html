<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniInsight BI Assistant - Tableau & Power BI Engine</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'pulse-subtle': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <!-- React 18 and ReactDOM UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Compiler for in-browser JSX compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML2Canvas Library for image exporting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Custom Scrollbar Style Overlays -->
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
      border-radius: 999px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.2);
      border-radius: 999px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.4);
    }
    body {
      background-color: #0f172a;
    }
  </style>
</head>
<body class="h-full overflow-hidden text-slate-100">

  <!-- Root mount element for React App -->
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Custom beautiful inline SVGs mapped to act like Lucide-react

        'file-spreadsheet': (

          </svg>
        ),
        'video': (
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} className={className}>

      };
      return icons[name] || icons['info'];
    };

    const SAMPLE_DATASETS = {
      ecommerce: {
        datasetName: "Kinerja Penjualan E-commerce Indonesia",
        columns: ["Kategori", "Wilayah", "Bulan", "Penjualan_Juta", "Keuntungan_Juta", "Transaksi"],
        data: [
          ["Elektronik", "Jawa", "Januari", 150, 35, 1200],
          ["Elektronik", "Sumatera", "Januari", 90, 18, 750],
          ["Elektronik", "Jawa", "Februari", 180, 42, 1400],
          ["Elektronik", "Sulawesi", "Januari", 45, 8, 380],
          ["Fashion", "Jawa", "Januari", 110, 45, 2200],
          ["Fashion", "Sumatera", "Januari", 85, 32, 1700],
          ["Fashion", "Jawa", "Februari", 130, 55, 2600],
          ["Fashion", "Kalimantan", "Januari", 60, 22, 1100],
          ["Kesehatan", "Jawa", "Januari", 70, 28, 900],
          ["Kesehatan", "Sumatera", "Januari", 40, 15, 520],
          ["Kesehatan", "Jawa", "Februari", 85, 34, 1150],
          ["Kesehatan", "Sulawesi", "Februari", 35, 12, 450],
          ["Makanan", "Jawa", "Januari", 95, 19, 3100],
          ["Makanan", "Sumatera", "Januari", 75, 14, 2400],
          ["Makanan", "Kalimantan", "Februari", 80, 16, 2500],
          ["Makanan", "Sulawesi", "Februari", 50, 9, 1600]
        ],
        aiSummary: "Analisis e-commerce menunjukkan kategori Fashion memiliki tingkat efisiensi profitabilitas tertinggi. Sedangkan wilayah Jawa terus memimpin volume pasar fisik mutlak."
      },
      hr_analytics: {
        datasetName: "Analisis Kepuasan & Retensi Karyawan",
        columns: ["Departemen", "Tingkat_Kepuasan", "Masa_Kerja", "Gaji_Juta", "Bonus_Persen", "Jumlah_Karyawan"],
        data: [
          ["Teknologi", "Tinggi", "1-3 Tahun", 12, 15, 45],
          ["Teknologi", "Sedang", "3-5 Tahun", 18, 20, 30],
          ["Teknologi", "Rendah", "1-3 Tahun", 10, 5, 15],
          ["Pemasaran", "Tinggi", "1-3 Tahun", 8, 10, 25],
          ["Pemasaran", "Rendah", "3-5 Tahun", 11, 8, 12],
          ["Keuangan", "Tinggi", "5+ Tahun", 22, 25, 20],
          ["Keuangan", "Sedang", "1-3 Tahun", 9, 12, 18],
          ["SDM", "Sedang", "3-5 Tahun", 10, 10, 14],
          ["SDM", "Rendah", "1-3 Tahun", 7, 5, 8],
        ],
        aiSummary: "Korelasi kuat antara kepuasan karyawan dengan skema insentif bonus. Departemen Teknologi membutuhkan fokus retensi khusus pada segmen karyawan junior."
      }
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [currentDataset, setCurrentDataset] = useState(SAMPLE_DATASETS.ecommerce);
      const [loading, setLoading] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      const [selectedFile, setSelectedFile] = useState(null);
      const [fileType, setFileType] = useState('');
      const [textPreview, setTextPreview] = useState('');
      const [imagePreviewUrl, setImagePreviewUrl] = useState(null);
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [customApiKey, setCustomApiKey] = useState('');

      const fileInputRef = useRef(null);

      // Global Filters
      const [globalFilters, setGlobalFilters] = useState({
        dim1: 'ALL',
        dim2: 'ALL',
        dim3: 'ALL'
      });

      const [gridDensity, setGridDensity] = useState('comfortable');

      // Default Visualizations configurations
      const [visualizations, setVisualizations] = useState([
        {
          id: 'vis_1',
          title: 'Penjualan Berdasarkan Kategori',
          type: 'bar',
          xCol: 0,
          yCol: 3,
          aggType: 'sum',
          width: 'col-span-2',
          palette: 'indigo'
        },
        {
          id: 'vis_2',
          title: 'Distribusi Wilayah & Keuntungan',
          type: 'pie',
          xCol: 1,
          yCol: 4,
          aggType: 'sum',
          width: 'col-span-1',
          palette: 'emerald'
        },
        {
          id: 'vis_3',
          title: 'Tren Penjualan dari Waktu ke Waktu',
          type: 'line',
          xCol: 2,
          yCol: 3,
          aggType: 'sum',
          width: 'col-span-1',
          palette: 'purple'
        },
        {
          id: 'vis_4',
          title: 'Kartu KPI: Total Transaksi',
          type: 'kpi',
          xCol: 0,
          yCol: 5,
          aggType: 'sum',
          width: 'col-span-1',
          palette: 'amber'
        },
        {
          id: 'vis_5',
          title: 'Tabel Ringkasan Efisiensi',
          type: 'table',
          xCol: 0,
          yCol: 4,
          aggType: 'avg',
          width: 'col-span-1',
          palette: 'rose'
        }
      ]);

      // Modals and Editors
      const [isEditorOpen, setIsEditorOpen] = useState(false);
      const [editingVisId, setEditingVisId] = useState(null);
      const [editorState, setEditorState] = useState({
        title: '',
        type: 'bar',
        xCol: 0,
        yCol: 3,
        aggType: 'sum',
        width: 'col-span-1',
        palette: 'indigo'
      });

      // Chat Assistant States
      const [chatMessages, setChatMessages] = useState([
        { role: 'assistant', text: 'Halo! Saya asisten Gemini AI Anda. Saya siap menganalisis grafik interaktif yang Anda rancang. Silakan tanyakan tren data, performa divisi, atau optimasi keputusan bisnis.' }
      ]);
      const [userInput, setUserInput] = useState('');
      const [isChatLoading, setIsChatLoading] = useState(false);
      const [autoInsight, setAutoInsight] = useState('');

      useEffect(() => {
        if (currentDataset) {
          generateDynamicInsight();
        }
      }, [currentDataset, globalFilters, visualizations]);

      const showToastMessage = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => {
          setToast({ show: false, message: '', type: 'info' });
        }, 4000);
      };

      const handleCrossFilterToggle = (colIndex, val) => {
        const key = colIndex === 0 ? 'dim1' : colIndex === 1 ? 'dim2' : 'dim3';
        setGlobalFilters(prev => {
          const updated = {
            ...prev,
            [key]: prev[key] === val ? 'ALL' : val
          };
          showToastMessage(`Cross-filter diterapkan: ${key.toUpperCase()} = ${updated[key]}`, 'info');
          return updated;
        });
      };

      const getFilteredRows = () => {
        if (!currentDataset || !currentDataset.data) return [];
        return currentDataset.data.filter(row => {
          const match1 = globalFilters.dim1 === 'ALL' || String(row[0]).toLowerCase() === globalFilters.dim1.toLowerCase();
          const match2 = globalFilters.dim2 === 'ALL' || String(row[1]).toLowerCase() === globalFilters.dim2.toLowerCase();
          const match3 = globalFilters.dim3 === 'ALL' || String(row[2]).toLowerCase() === globalFilters.dim3.toLowerCase();
          return match1 && match2 && match3;
        });
      };

      const filteredData = getFilteredRows();

      const getUniqueDimensionValues = (colIdx) => {
        if (!currentDataset || !currentDataset.data) return [];
        const raw = currentDataset.data.map(r => r[colIdx]);
        return ['ALL', ...new Set(raw)];
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          processFile(e.dataTransfer.files[0]);
        }
      };

      const handleFileSelect = (e) => {
        if (e.target.files && e.target.files[0]) {
          processFile(e.target.files[0]);
        }
      };

      const processFile = (file) => {
        setSelectedFile(file);
        const ext = file.name.split('.').pop().toLowerCase();
        setFileType(ext);

        if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
          const reader = new FileReader();
          reader.onload = (e) => {
            setImagePreviewUrl(e.target.result);
            setTextPreview(`[Screenshot Laporan Gambar: ${file.name}]`);
            showToastMessage("Gambar laporan berhasil dimuat untuk dianalisis.", "success");
          };
          reader.readAsDataURL(file);
        } else if (['txt', 'csv', 'json'].includes(ext)) {
          const reader = new FileReader();
          reader.onload = (e) => {
            setTextPreview(e.target.result.slice(0, 2000));
            setImagePreviewUrl(null);
            showToastMessage("File teks/CSV berhasil dimuat.", "success");
          };
          reader.readAsText(file);
        } else {
          setImagePreviewUrl(null);
          setTextPreview(`Dokumen berhasil termuat: ${file.name}\nMedia terdeteksi sebagai referensi biner. Gemini AI siap memetakan struktur file ini.`);
          showToastMessage("Dokumen biner siap diproses oleh Gemini.", "info");
        }
      };

      const extractDataWithGemini = async () => {
        setLoading(true);
        const activeApiKey = customApiKey.trim();

        if (!activeApiKey) {
          showToastMessage("API Key kosong. Menjalankan simulasi ekstraksi cerdas...", "info");
          setTimeout(() => {
            simulateDataExtraction();
            setLoading(false);
          }, 1200);
          return;
        }

        try {
          let prompt = `Anda adalah asisten data biner Tableau & Power BI. Ekstrak data tabel dari file berikut dan susun skema relasional tabel yang kaya.
Nama File: ${selectedFile ? selectedFile.name : 'Data Mentah'}
Tipe Ekstensi: ${fileType}
Pratinjau Teks:
${textPreview}

Hasilkan output murni berformat JSON dengan struktur persis seperti ini:
{
  "datasetName": "Nama representatif dari file yang diekstrak",
  "columns": ["KategoriUtama", "WilayahCabang", "PeriodeWaktu", "VolumeMetrik_Angka", "MetrikEfisiensi_Angka", "MetrikVolumeKedua_Angka"],
  "data": [
    ["KategoriA", "Jawa", "Januari", 120, 45, 1000],
    ... (Hasilkan setidaknya 10-18 baris data variatif untuk keperluan analisis visualisasi)
  ],
  "aiSummary": "Tulis 2 paragraf ringkasan eksekutif tajam mengenai tren data ini."
}`;

          let payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json" }
          };

          if (imagePreviewUrl && ['jpg', 'jpeg', 'png', 'webp'].includes(fileType)) {
            const base64Data = imagePreviewUrl.split(',')[1];
            payload.contents[0].parts = [
              { text: "Ekstrak seluruh visualisasi data, tabel angka, serta detail diagram di screenshot gambar ini menjadi struktur JSON utuh sesuai skema yang diminta." },
              { inlineData: { mimeType: `image/${fileType === 'jpg' ? 'jpeg' : fileType}`, data: base64Data } }
            ];
          }

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error("Terjadi gangguan respons model Gemini.");

          const resJson = await response.json();
          const rawText = resJson.candidates?.[0]?.content?.parts?.[0]?.text;
          
          const parsed = JSON.parse(rawText.trim());
          if (parsed.columns && parsed.data) {
            setCurrentDataset(parsed);
            setGlobalFilters({ dim1: 'ALL', dim2: 'ALL', dim3: 'ALL' });
            setActiveTab('dashboard');
            showToastMessage("Berhasil mengekstrak data menggunakan Gemini AI!", "success");
          } else {
            throw new Error("Pola struktur data dari AI tidak kompatibel.");
          }
        } catch (err) {
          console.error(err);
          showToastMessage("Terjadi kendala API. Menggunakan kecerdasan simulasi fallback...", "info");
          simulateDataExtraction();
        } finally {
          setLoading(false);
        }
      };

      const simulateDataExtraction = () => {
        const simulated = {
          datasetName: `Ekstraksi Cerdas [${selectedFile ? selectedFile.name : 'Analisis_Bisnis.xlsx'}]`,
          columns: ["Layanan_Aplikasi", "Pulau_Distribusi", "Kuartal", "Pengguna_Aktif_Ribu", "Tingkat_Retensi_Persen", "Biaya_Operasional_Juta"],
          data: [
            ["Fintech", "Jawa", "Q1", 280, 85, 120],
            ["Fintech", "Sumatera", "Q1", 110, 72, 60],
            ["Fintech", "Sulawesi", "Q1", 65, 60, 45],
            ["Edutech", "Jawa", "Q1", 410, 92, 190],
            ["Edutech", "Sumatera", "Q1", 180, 78, 110],
            ["Healthtech", "Jawa", "Q1", 330, 89, 150],
            ["Healthtech", "Kalimantan", "Q1", 95, 74, 55],
            ["Logistik", "Jawa", "Q1", 520, 80, 310],
            ["Logistik", "Sumatera", "Q1", 240, 70, 180],
          ],
          aiSummary: "Ekstraksi dokumen menunjukkan keunggulan penetrasi layanan Logistik & Edutech di wilayah Jawa dengan rasio retensi yang sangat kompetitif."
        };
        setCurrentDataset(simulated);
        setGlobalFilters({ dim1: 'ALL', dim2: 'ALL', dim3: 'ALL' });
        setActiveTab('dashboard');
      };

      const calculateChartData = (vis) => {
        const dataMap = {};
        filteredData.forEach(row => {
          const label = String(row[vis.xCol]);
          const value = Number(row[vis.yCol]) || 0;

          if (!dataMap[label]) {
            dataMap[label] = { total: 0, count: 0 };
          }
          dataMap[label].total += value;
          dataMap[label].count += 1;
        });

        return Object.keys(dataMap).map(label => {
          const aggregated = vis.aggType === 'avg' 
            ? (dataMap[label].total / dataMap[label].count) 
            : dataMap[label].total;
          return {
            label,
            value: parseFloat(aggregated.toFixed(1))
          };
        });
      };

      const openAddVisualEditor = () => {
        setEditingVisId(null);
        setEditorState({
          title: `Visualisasi ${visualizations.length + 1}`,
          type: 'bar',
          xCol: 0,
          yCol: currentDataset.columns.length > 3 ? 3 : currentDataset.columns.length - 1,
          aggType: 'sum',
          width: 'col-span-1',
          palette: 'indigo'
        });
        setIsEditorOpen(true);
      };

      const openEditVisualEditor = (vis) => {
        setEditingVisId(vis.id);
        setEditorState({ ...vis });
        setIsEditorOpen(true);
      };

      const saveVisualSettings = () => {
        if (editingVisId) {
          setVisualizations(prev => prev.map(v => v.id === editingVisId ? { ...editorState } : v));
          showToastMessage("Visualisasi berhasil diperbarui.", "success");
        } else {
          const newId = `vis_${Date.now()}`;
          setVisualizations(prev => [...prev, { ...editorState, id: newId }]);
          showToastMessage("Visualisasi baru ditambahkan ke kanvas.", "success");
        }
        setIsEditorOpen(false);
      };

      const deleteVisualization = (id) => {
        setVisualizations(prev => prev.filter(v => v.id !== id));
        showToastMessage("Visualisasi dihapus dari kanvas.", "info");
      };

      const clearAllVisualizations = () => {
        setVisualizations([]);
        showToastMessage("Semua visualisasi berhasil dibersihkan dari kanvas.", "info");
      };

      const moveVisual = (index, direction) => {
        const nextIndex = direction === 'left' ? index - 1 : index + 1;
        if (nextIndex < 0 || nextIndex >= visualizations.length) return;
        const newVisList = [...visualizations];
        const temp = newVisList[index];
        newVisList[index] = newVisList[nextIndex];
        newVisList[nextIndex] = temp;
        setVisualizations(newVisList);
      };

      const toggleVisualWidth = (id) => {
        setVisualizations(prev => prev.map(v => {
          if (v.id === id) {
            const nextWidth = v.width === 'col-span-1' 
              ? 'col-span-2' 
              : v.width === 'col-span-2' 
                ? 'col-span-3' 
                : 'col-span-1';
            return { ...v, width: nextWidth };
          }
          return v;
        }));
      };

      const generateDynamicInsight = async () => {
        setAutoInsight('Memformulasikan pemahaman analitis...');
        try {
          const activeState = {
            dataset: currentDataset.datasetName,
            activeFilters: globalFilters,
            visibleChartsCount: visualizations.length,
            metricsOverview: visualizations.slice(0, 3).map(v => ({
              title: v.title,
              dataPlot: calculateChartData(v)
            }))
          };

          const prompt = `Anda adalah pakar BI Tableau/Power BI Senior. Berikan analisis tren ringkas (maksimal 120 kata dalam Bahasa Indonesia) berdasarkan setup chart dan visual data yang aktif berikut ini:\n${JSON.stringify(activeState)}\n\nSebutkan anomali kunci dan aksi korporasi strategis yang mesti diambil.`;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${customApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });

          if (!response.ok) throw new Error("API Offline");
          const resJson = await response.json();
          const aiResponseText = resJson.candidates?.[0]?.content?.parts?.[0]?.text;
          if (aiResponseText) {
            setAutoInsight(aiResponseText.trim());
          } else {
            setAutoInsight(currentDataset.aiSummary || "Semua metrik operasional terdistribusi stabil.");
          }
        } catch (e) {
          setAutoInsight(`[Ulasan Instan] Berdasarkan filter dinamis yang aktif, kategori teratas mendominasi dengan kontribusi efisiensi rata-rata yang optimal. Disarankan untuk memfokuskan sumber daya pemasaran pada cabang regional dengan rasio pertumbuhan positif.`);
        }
      };

      const handleSendChat = async (e) => {
        e.preventDefault();
        if (!userInput.trim()) return;

        const msg = userInput.trim();
        setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
        setUserInput('');
        setIsChatLoading(true);

        try {
          const activeDashboardState = {
            dataset: currentDataset.datasetName,
            currentFilters: globalFilters,
            visualizations: visualizations.map(v => ({
              title: v.title,
              type: v.type,
              data: calculateChartData(v)
            }))
          };

          const prompt = `Anda adalah asisten chatbot eksekutif yang tertanam langsung di software visualisasi BI OmniInsight (gabungan Power BI & Tableau). Jawab pertanyaan pengguna berikut ini secara profesional dalam Bahasa Indonesia, dengan mengacu penuh pada data visual saat ini:
Dashboard State: ${JSON.stringify(activeDashboardState)}
Pertanyaan Pengguna: "${msg}"`;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${customApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });

          if (!response.ok) throw new Error("Gagal memanggil API Gemini.");
          const resJson = await response.json();
          const reply = resJson.candidates?.[0]?.content?.parts?.[0]?.text;

          setChatMessages(prev => [
            ...prev, 
            { role: 'assistant', text: reply || "Terjadi kendala memproses data chatbot." }
          ]);
        } catch (err) {
          setChatMessages(prev => [
            ...prev,
            { role: 'assistant', text: `[Simulasi Analis AI] Mengenai pertanyaan "${msg}", berdasarkan plot grafik saat ini, nilai agregat menunjukkan dominasi signifikan pada dimensi utama dengan tren sebaran yang sehat.` }
          ]);
        } finally {
          setIsChatLoading(false);
        }
      };

      const exportToDocFormat = async () => {
        if (typeof window.html2canvas === 'undefined') {
          showToastMessage("Sistem capture gambar sedang dimuat, silakan klik ulang dalam beberapa detik.", "info");
          return;
        }

        setIsExporting(true);
        showToastMessage("Membentuk dokumen Microsoft Word lengkap dengan seluruh screenshot grafik...", "info");
        const docTitle = `OmniInsight_Report_${currentDataset.datasetName.replace(/\s+/g, '_')}`;
        const capturedImages = {};

        for (const vis of visualizations) {
          const element = document.getElementById(`chart-card-${vis.id}`);
          if (element) {
            try {
              const controls = element.querySelector('.panel-controls');
              if (controls) controls.style.display = 'none';

              const canvas = await window.html2canvas(element, {
                backgroundColor: '#1e293b',
                scale: 2,
                logging: false,
                useCORS: true
              });

              if (controls) controls.style.display = 'flex';
              
              const rawBase64 = canvas.toDataURL('image/png').split(',')[1];
              capturedImages[vis.id] = rawBase64;
            } catch (error) {
              console.error(`Gagal melakukan capture visualisasi ${vis.id}:`, error);
            }
          }
        }

        const boundary = "==OMNI_INSIGHT_MHTML_BOUNDARY==";
        let htmlContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>OmniInsight Executive BI Report</title>
            <style>
              body { font-family: 'Segoe UI', Arial, sans-serif; padding: 25px; line-height: 1.6; color: #1e293b; max-width: 800px; margin: auto; }
              h1 { color: #1e3a8a; border-bottom: 3px solid #2563eb; padding-bottom: 12px; margin-bottom: 20px; font-size: 22pt; }
              h2 { color: #0f172a; border-bottom: 1.5px solid #cbd5e1; padding-bottom: 6px; margin-top: 30px; font-size: 14pt; }
              h3 { color: #0f172a; margin-top: 15px; font-size: 11.5pt; }
              p { font-size: 10pt; color: #334155; margin-bottom: 10px; }
              .meta-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 25px; }
              .meta-table td, .meta-table th { border: 1px solid #cbd5e1; padding: 10px; font-size: 9.5pt; }
              .meta-table th { background-color: #f1f5f9; font-weight: bold; text-align: left; }
              .ai-box { background-color: #f0fdf4; border-left: 5px solid #16a34a; padding: 18px; border-radius: 6px; margin-bottom: 30px; font-size: 10.5pt; font-style: italic; color: #14532d; }
              .chart-card-wrapper { margin-bottom: 35px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; background-color: #ffffff; text-align: center; }
              .chart-img { max-width: 100%; border-radius: 6px; margin: 15px auto; display: block; border: 1px solid #cbd5e1; }
              .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
              .data-table th, .data-table td { border: 1px solid #cbd5e1; padding: 8px 12px; text-align: left; font-size: 9pt; }
              .data-table th { background-color: #1e3a8a; color: #ffffff; }
            </style>
          </head>
          <body>
            <h1>LAPORAN ANALISIS EKSEKUTIF OMNIINSIGHT BI</h1>
            <p style="font-size: 9pt; color: #64748b;">Dihasilkan secara dinamis lewat Google Gemini Engine pada: ${new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
            
            <h2>1. Profil Sumber Dataset & Slicer Aktif</h2>
            <table class="meta-table">
              <tr>
                <th>Parameter Sistem</th>
                <th>Keterangan Data Aktif</th>
              </tr>
              <tr>
                <td><strong>Nama Dataset Utama</strong></td>
                <td>${currentDataset.datasetName}</td>
              </tr>
              <tr>
                <td><strong>Status Filter / Slicer</strong></td>
                <td>
                  F1: ${globalFilters.dim1} | F2: ${globalFilters.dim2} | F3: ${globalFilters.dim3}
                </td>
              </tr>
              <tr>
                <td><strong>Jumlah Transaksi Terpilih</strong></td>
                <td>${filteredData.length} baris (dari total ${currentDataset.data.length} data)</td>
              </tr>
            </table>

            <h2>2. Rekomendasi & Analisis AI Terintegrasi</h2>
            <div class="ai-box">
              "${autoInsight || currentDataset.aiSummary}"
            </div>

            <h2>3. Visualisasi Grafik & Detail Metrik</h2>
            ${visualizations.map(v => {
              const chartValues = calculateChartData(v);
              const hasBase64Image = capturedImages[v.id];
              return `
                <div class="chart-card-wrapper">
                  <h3 style="text-align: left; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-top: 0;">${v.title} (${v.type.toUpperCase()})</h3>
                  <p style="font-size: 9pt; color: #475569; text-align: left; margin-bottom: 12px;">
                    Sumbu Dimensi: <strong>${currentDataset.columns[v.xCol]}</strong> | Metrik: <strong>${currentDataset.columns[v.yCol]} (${v.aggType.toUpperCase()})</strong>
                  </p>
                  
                  ${hasBase64Image ? `
                    <div style="background-color: #1e293b; padding: 12px; border-radius: 8px; display: inline-block; width: 100%; max-width: 600px; margin: 15px auto;">
                      <img class="chart-img" src="cid:img_node_${v.id}" alt="${v.title}" width="550" />
                    </div>
                  ` : '<p style="color: #ef4444; font-size: 9pt;">[Gambar Grafik Tidak Termuat]</p>'}

                  <table class="data-table">
                    <thead>
                      <tr style="background-color: #f8fafc;">
                        <th style="color: #334155; background-color: #f1f5f9; border: 1px solid #cbd5e1;">Sumbu Dimensi</th>
                        <th style="color: #334155; background-color: #f1f5f9; border: 1px solid #cbd5e1; text-align: right;">Nilai Teragregasi</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${chartValues.map(item => `
                        <tr>
                          <td style="border: 1px solid #cbd5e1;">${item.label}</td>
                          <td style="border: 1px solid #cbd5e1; text-align: right; font-weight: bold;">${item.value.toLocaleString('id-ID')}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              `;
            }).join('')}

            <h2>4. Tabel Sumber Data Utama Terkonsolidasi</h2>
            <table class="data-table">
              <thead>
                <tr style="background-color: #1e3a8a; color: #ffffff;">
                  ${currentDataset.columns.map(col => `<th style="border: 1px solid #cbd5e1; padding: 8px 12px; text-align: left;">${col}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${filteredData.map(row => `
                  <tr>
                    ${row.map(cell => `<td style="border: 1px solid #cbd5e1; padding: 8px 12px;">${typeof cell === 'number' ? cell.toLocaleString('id-ID') : cell}</td>`).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </body>
          </html>
        `;

        let mhtml = `MIME-Version: 1.0\n`;
        mhtml += `Content-Type: multipart/related; boundary="${boundary}"\n\n`;

        mhtml += `--${boundary}\n`;
        mhtml += `Content-Type: text/html; charset="utf-8"\n`;
        mhtml += `Content-Transfer-Encoding: base64\n\n`;
        
        const base64Html = btoa(unescape(encodeURIComponent(htmlContent)));
        mhtml += `${base64Html}\n\n`;

        for (const [id, base64Data] of Object.entries(capturedImages)) {
          mhtml += `--${boundary}\n`;
          mhtml += `Content-Location: cid:img_node_${id}\n`;
          mhtml += `Content-Type: image/png\n`;
          mhtml += `Content-Transfer-Encoding: base64\n\n`;
          mhtml += `${base64Data}\n\n`;
        }

        mhtml += `--${boundary}--`;

        const blob = new Blob([mhtml], { type: "application/msword" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${docTitle}.doc`;
        a.click();
        setIsExporting(false);
        showToastMessage("Laporan interaktif dengan grafik rapi berhasil diekspor!", "success");
      };

      const getPaletteColors = (palette) => {
        const schemes = {
          indigo: { bg: 'bg-indigo-500', hoverBg: 'hover:bg-indigo-400', fill: '#6366f1', text: 'text-indigo-400' },
          emerald: { bg: 'bg-emerald-500', hoverBg: 'hover:bg-emerald-400', fill: '#10b981', text: 'text-emerald-400' },
          purple: { bg: 'bg-purple-500', hoverBg: 'hover:bg-purple-400', fill: '#a855f7', text: 'text-purple-400' },
          amber: { bg: 'bg-amber-500', hoverBg: 'hover:bg-amber-400', fill: '#f59e0b', text: 'text-amber-400' },
          rose: { bg: 'bg-rose-500', hoverBg: 'hover:bg-rose-400', fill: '#f43f5e', text: 'text-rose-400' }
        };
        return schemes[palette] || schemes.indigo;
      };

      return (
        <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col overflow-hidden relative isolate">
          
          {/* Toast Notification HUD */}
          {toast.show && (
            <div className="fixed top-24 right-6 z-[200] flex items-center gap-3 bg-slate-800 border border-slate-700/80 text-white py-3 px-5 rounded-2xl shadow-2xl animate-bounce">
              <div className="p-1.5 rounded-full bg-blue-500/20 text-blue-400">
                <Icon name="bell" className="w-4 h-4" />
              </div>
              <span className="text-xs font-semibold">{toast.message}</span>
            </div>
          )}

          {/* Static Top Header */}
          <header className="h-20 border-b border-slate-800 bg-slate-900/95 backdrop-blur-md flex flex-row items-center justify-between px-6 flex-shrink-0 z-[100] relative gap-4">
            {/* Left Side Logo */}
            <div className="flex items-center space-x-3 flex-shrink-0">
              <div className="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2.5 rounded-xl shadow-lg shadow-blue-500/20">
                <Icon name="sliders" className="w-6 h-6 text-white" />
              </div>
              <div>
                <h1 className="text-base md:text-lg font-bold tracking-tight bg-gradient-to-r from-white via-slate-200 to-blue-400 bg-clip-text text-transparent flex items-center gap-2">
                  OmniInsight BI
                  <span className="text-[10px] bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded-full font-bold">Infinite Engine</span>
                </h1>
                <p className="hidden md:block text-[11px] text-slate-400">Arsitektur Dashboard Interaktif dengan Kustomisasi Sumbu Bebas & Gemini AI</p>
              </div>
            </div>

            {/* Right Side Controls */}
            <div className="flex items-center space-x-3 flex-shrink-0 pointer-events-auto">
              <nav className="flex space-x-1 bg-slate-800 p-1 rounded-xl border border-slate-700 relative">
                <button 
                  onClick={() => {
                    setActiveTab('dashboard');
                    showToastMessage("Beralih ke Kanvas Interaktif.", "info");
                  }} 
                  className={`px-3 md:px-4 py-2 rounded-lg text-xs font-semibold transition-all cursor-pointer ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}
                >
                  Interactive Canvas
                </button>
                <button 
                  onClick={() => {
                    setActiveTab('upload');
                    showToastMessage("Beralih ke Pusat Unggah Data.", "info");
                  }} 
                  className={`px-3 md:px-4 py-2 rounded-lg text-xs font-semibold transition-all cursor-pointer ${activeTab === 'upload' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}
                >
                  Unggah & Ekstrak AI
                </button>
              </nav>

              <div className="hidden sm:flex items-center gap-2">
                <button 
                  onClick={openAddVisualEditor}
                  className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 text-white px-3.5 py-1.5 rounded-xl text-xs font-semibold transition-all shadow cursor-pointer"
                >
                  <Icon name="plus" className="w-4 h-4" />
                  <span>Tambah Visual</span>
                </button>

                <button 
                  onClick={exportToDocFormat}
                  disabled={isExporting}
                  className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-100 px-3.5 py-1.5 rounded-xl border border-slate-700 text-xs transition-all disabled:opacity-50 cursor-pointer"
                  title="Ekspor seluruh hasil ke .doc"
                >
                  {isExporting ? (
                    <>
                      <Icon name="refresh" className="w-4 h-4 text-emerald-400 animate-spin" />
                      <span>Mengekspor...</span>
                    </>
                  ) : (
                    <>
                      <Icon name="download" className="w-4 h-4 text-emerald-400" />
                      <span>Ekspor .doc</span>
                    </>
                  )}
                </button>
              </div>
            </div>
          </header>

          {/* Double Scroll Area Layout */}
          <main className="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden w-full relative z-10">
            
            {/* Left Sidebar Layout */}
            <div className="w-full lg:w-80 bg-slate-800/40 border-r border-slate-800 p-5 flex-shrink-0 flex flex-col space-y-6 lg:h-full lg:overflow-y-auto custom-scrollbar relative z-30">
              
              <div className="bg-slate-800/60 rounded-2xl p-4 border border-slate-700/60 shadow-xl">
                <h3 className="text-xs font-bold text-white flex items-center gap-2 mb-3">
                  <Icon name="database" className="w-4 h-4 text-blue-400" />
                  Sila Hubungkan Dataset
                </h3>
                <div className="bg-slate-900/60 rounded-xl p-3 border border-slate-800 mb-4">
                  <p className="text-xs font-semibold text-white line-clamp-2">{currentDataset.datasetName}</p>
                  <div className="flex justify-between mt-2 text-[10px] text-slate-400 border-t border-slate-800/80 pt-2">
                    <span>Dimensi/Metrik: {currentDataset.columns.length}</span>
                    <span>Baris: {currentDataset.data.length}</span>
                  </div>
                </div>

                <p className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Preset Data Bawaan:</p>
                <div className="grid grid-cols-1 gap-2">
                  <button 
                    onClick={() => {
                      setCurrentDataset(SAMPLE_DATASETS.ecommerce);
                      setGlobalFilters({ dim1: 'ALL', dim2: 'ALL', dim3: 'ALL' });
                      showToastMessage("Berganti ke dataset E-commerce.", "info");
                    }}
                    className={`p-2 rounded-lg text-left text-[11px] font-medium border transition-all ${currentDataset.datasetName.includes('Penjualan') ? 'bg-blue-600/10 border-blue-500 text-blue-300' : 'bg-slate-950/40 border-slate-800 text-slate-400 hover:bg-slate-800'}`}
                  >
                    💼 E-commerce Sales Performance
                  </button>
                  <button 
                    onClick={() => {
                      setCurrentDataset(SAMPLE_DATASETS.hr_analytics);
                      setGlobalFilters({ dim1: 'ALL', dim2: 'ALL', dim3: 'ALL' });
                      showToastMessage("Berganti ke dataset Analisis SDM.", "info");
                    }}
                    className={`p-2 rounded-lg text-left text-[11px] font-medium border transition-all ${currentDataset.datasetName.includes('Retensi') ? 'bg-blue-600/10 border-blue-500 text-blue-300' : 'bg-slate-950/40 border-slate-800 text-slate-400 hover:bg-slate-800'}`}
                  >
                    👥 HR Satisfaction & Compensation
                  </button>
                </div>
              </div>

              {/* Slicer Filters */}
              <div className="bg-slate-800/60 rounded-2xl p-4 border border-slate-700/60 shadow-xl">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-xs font-bold text-white flex items-center gap-2">
                    <Icon name="filter" className="w-4 h-4 text-emerald-400" />
                    Slicer Filter Global
                  </h3>
                  {(globalFilters.dim1 !== 'ALL' || globalFilters.dim2 !== 'ALL' || globalFilters.dim3 !== 'ALL') && (
                    <button 
                      onClick={() => setGlobalFilters({ dim1: 'ALL', dim2: 'ALL', dim3: 'ALL' })}
                      className="text-[10px] text-rose-400 hover:text-rose-300 transition-all font-medium"
                    >
                      Clear Slicers
                    </button>
                  )}
                </div>

                <div className="space-y-4">
                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1 font-medium">Sumbu F1 ({currentDataset.columns[0] || 'Kategori'})</label>
                    <select 
                      value={globalFilters.dim1}
                      onChange={(e) => setGlobalFilters(p => ({ ...p, dim1: e.target.value }))}
                      className="w-full bg-slate-900 border border-slate-700 rounded-lg py-1 px-2.5 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-500"
                    >
                      {getUniqueDimensionValues(0).map(v => (
                        <option key={v} value={v}>{v === 'ALL' ? 'Semua (ALL)' : v}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1 font-medium">Sumbu F2 ({currentDataset.columns[1] || 'Wilayah'})</label>
                    <select 
                      value={globalFilters.dim2}
                      onChange={(e) => setGlobalFilters(p => ({ ...p, dim2: e.target.value }))}
                      className="w-full bg-slate-900 border border-slate-700 rounded-lg py-1 px-2.5 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-500"
                    >
                      {getUniqueDimensionValues(1).map(v => (
                        <option key={v} value={v}>{v === 'ALL' ? 'Semua (ALL)' : v}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1 font-medium">Sumbu F3 ({currentDataset.columns[2] || 'Waktu'})</label>
                    <select 
                      value={globalFilters.dim3}
                      onChange={(e) => setGlobalFilters(p => ({ ...p, dim3: e.target.value }))}
                      className="w-full bg-slate-900 border border-slate-700 rounded-lg py-1 px-2.5 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-500"
                    >
                      {getUniqueDimensionValues(2).map(v => (
                        <option key={v} value={v}>{v === 'ALL' ? 'Semua (ALL)' : v}</option>
                      ))}
                    </select>
                  </div>
                </div>
              </div>

              {/* Dynamic Insight summary */}
              <div className="bg-gradient-to-br from-indigo-900/40 to-slate-800 rounded-2xl p-4 border border-indigo-500/20 shadow-lg mb-4">
                <div className="flex items-center gap-2 mb-2 text-indigo-400">
                  <Icon name="sparkles" className="w-4 h-4 text-indigo-300" />
                  <h4 className="text-[10px] font-bold uppercase tracking-wider">Uraian Analisis Canvas BI</h4>
                </div>
                <p className="text-[11px] text-slate-300 leading-relaxed max-h-40 overflow-y-auto pr-1">
                  {autoInsight || "Menghitung korelasi metrik..."}
                </p>
              </div>

            </div>

            {/* Right Main Working Canvas Area */}
            <div className="flex-1 lg:overflow-y-auto p-4 md:p-6 space-y-6 bg-slate-950/25 lg:h-full custom-scrollbar">
              
              {activeTab === 'upload' ? (
                
                /* File Upload Screen */
                <div className="bg-slate-800/60 rounded-3xl p-6 md:p-8 border border-slate-700/60 shadow-xl max-w-4xl mx-auto">
                  <div className="text-center">
                    <h2 className="text-xl font-bold text-white mb-2">Pusat Ekstraksi AI Multi-Media</h2>
                    <p className="text-slate-400 text-xs mb-6">OmniInsight dapat mengekstrak data dari dokumen teks (Excel, Word, CSV, PDF), screenshot gambar, hingga deskripsi video biner.</p>
                    
                    {/* Optional Custom API Key input */}
                    <div className="bg-slate-900/60 rounded-2xl p-4 border border-slate-800 text-left mb-6">
                      <label className="text-[10px] font-bold text-indigo-400 block mb-1 uppercase tracking-wider">Gemini API Key (Opsional)</label>
                      <input 
                        type="password"
                        value={customApiKey}
                        onChange={(e) => setCustomApiKey(e.target.value)}
                        placeholder="Masukkan Gemini API Key Anda di sini... (Biarkan kosong untuk simulasi otomatis)"
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2 px-3 text-xs text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                      />
                      <p className="text-[9px] text-slate-500 mt-1">Jika dibiarkan kosong, sistem akan menyimulasikan proses ekstraksi dokumen secara visual tanpa kegagalan koneksi.</p>
                    </div>

                    <div 
                      onDragEnter={handleDrag}
                      onDragOver={handleDrag}
                      onDragLeave={handleDrag}
                      onDrop={handleDrop}
                      className="border-2 border-dashed rounded-2xl p-8 transition-all flex flex-col items-center justify-center border-slate-700 hover:border-slate-500 bg-slate-900/40 relative active:bg-slate-800/60 overflow-hidden min-h-[160px]"
                    >
                      <input 
                        type="file" 
                        id="file-upload" 
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30" 
                        onChange={handleFileSelect}
                        accept=".csv, .xlsx, .xls, .doc, .docx, .pdf, .png, .jpg, .jpeg, .txt"
                      />
                      <div className="flex flex-col items-center pointer-events-none z-10">
                        <div className="bg-slate-800 p-4 rounded-full text-blue-400 mb-4 border border-slate-700">
                          <Icon name="upload" className="w-8 h-8" />
                        </div>
                        <span className="text-xs font-semibold text-white mb-1">Pilih media data / Seret media Anda ke mari</span>
                        <span className="text-[10px] text-slate-500 mb-2">Mendukung berkas teks, biner spreadsheet, & gambar (screenshot)</span>
                      </div>
                    </div>

                    {selectedFile && (
                      <div className="mt-6 bg-slate-900 rounded-xl p-4 border border-slate-800 text-left">
                        <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-3">
                          <div className="flex items-center space-x-3">
                            <div className="bg-blue-600/20 p-2 rounded-lg text-blue-400">
                              {['png', 'jpg', 'jpeg'].includes(fileType) ? <Icon name="file-image" className="w-5 h-5" /> : <Icon name="file-spreadsheet" className="w-5 h-5" />}
                            </div>
                            <div>
                              <p className="text-xs font-medium text-white line-clamp-1">{selectedFile.name}</p>
                              <p className="text-[10px] text-slate-500">{(selectedFile.size / 1024).toFixed(1)} KB</p>
                            </div>
                          </div>
                          <button 
                            onClick={(e) => {
                              e.stopPropagation();
                              setSelectedFile(null);
                              setTextPreview('');
                              setImagePreviewUrl(null);
                              showToastMessage("Menghapus file pilihan.", "info");
                            }} 
                            className="text-rose-400 hover:text-rose-300 p-1.5 rounded-lg z-40 relative"
                          >
                            <Icon name="trash" className="w-4 h-4" />
                          </button>
                        </div>

                        {imagePreviewUrl && (
                          <div className="mb-4 rounded-lg overflow-hidden border border-slate-800 max-h-60 flex items-center justify-center bg-slate-950">
                            <img src={imagePreviewUrl} alt="Preview Screenshot" className="object-contain max-h-60" />
                          </div>
                        )}

                        <div className="bg-slate-950 rounded-lg p-3 text-xs font-mono text-slate-400 max-h-40 overflow-y-auto whitespace-pre-wrap mb-4">
                          {textPreview}
                        </div>

                        <button 
                          onClick={extractDataWithGemini}
                          disabled={loading}
                          className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center space-x-2 disabled:opacity-50 text-xs z-40 relative"
                        >
                          {loading ? (
                            <>
                              <Icon name="refresh" className="w-4 h-4 animate-spin text-white" />
                              <span>Gemini AI sedang memetakan relasi data...</span>
                            </>
                          ) : (
                            <>
                              <Icon name="sparkles" className="w-4 h-4 text-indigo-300" />
                              <span>Buat Dashboard BI dari Berkas Ini</span>
                            </>
                          )}
                        </button>
                      </div>
                    )}
                  </div>
                </div>

              ) : (

                /* Interactive Dashboard Work area */
                <div className="space-y-6">

                  <div className="bg-slate-800/50 rounded-2xl p-3 px-4 border border-slate-700/40 flex items-center justify-between flex-wrap gap-2 text-xs">
                    <div className="flex items-center space-x-3">
                      <div className="flex items-center space-x-1.5 text-slate-400">
                        <Icon name="layers" className="w-4 h-4 text-blue-400" />
                        <span className="font-semibold text-slate-300">Workspace Canvas:</span>
                      </div>
                      <span className="bg-slate-900 border border-slate-850 px-2.5 py-0.5 rounded-full text-[10px] text-indigo-300 font-bold">
                        {visualizations.length} Visual Aktif
                      </span>
                    </div>

                    <div className="flex items-center space-x-3">
                      <div className="flex items-center space-x-1 bg-slate-900 p-1 rounded-lg border border-slate-800">
                        <button 
                          onClick={() => {
                            setGridDensity('compact');
                            showToastMessage("Grid disetel ke mode Padat (Compact).", "info");
                          }}
                          className={`px-2 py-0.5 rounded text-[10px] font-medium transition-all ${gridDensity === 'compact' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400'}`}
                        >
                          Padat
                        </button>
                        <button 
                          onClick={() => {
                            setGridDensity('comfortable');
                            showToastMessage("Grid disetel ke mode Nyaman (Comfortable).", "info");
                          }}
                          className={`px-2 py-0.5 rounded text-[10px] font-medium transition-all ${gridDensity === 'comfortable' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400'}`}
                        >
                          Nyaman
                        </button>
                      </div>

                      {visualizations.length > 0 && (
                        <button 
                          onClick={clearAllVisualizations}
                          className="flex items-center space-x-1 text-xs text-rose-400 hover:text-rose-300 font-semibold"
                        >
                          <Icon name="trash" className="w-3.5 h-3.5" />
                          <span>Hapus Semua Visual</span>
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Infinite dynamic visualization grid */}
                  <div className={`grid grid-cols-1 md:grid-cols-3 ${gridDensity === 'compact' ? 'gap-4' : 'gap-6'} transition-all`}>
                    
                    {visualizations.map((vis, idx) => {
                      const chartData = calculateChartData(vis);
                      const scheme = getPaletteColors(vis.palette);
                      
                      return (
                        <div 
                          key={vis.id} 
                          id={`chart-card-${vis.id}`}
                          className={`bg-slate-800/60 rounded-2xl p-4 border border-slate-700/60 shadow-lg flex flex-col transition-all hover:border-slate-600 ${vis.width}`}
                        >
                          <div className="flex items-center justify-between border-b border-slate-700/40 pb-3 mb-4 flex-shrink-0">
                            <div className="flex items-center space-x-2 min-w-0">
                              <span className={`p-1.5 rounded-lg bg-slate-900/60 ${scheme.text}`}>
                                {vis.type === 'bar' && <Icon name="bar-chart" className="w-4 h-4" />}
                                {vis.type === 'horizontal_bar' && <Icon name="bar-chart" className="w-4 h-4 transform rotate-90" />}
                                {vis.type === 'pie' && <Icon name="pie-chart" className="w-4 h-4" />}
                                {vis.type === 'line' && <Icon name="trending-up" className="w-4 h-4" />}
                                {vis.type === 'kpi' && <Icon name="file-spreadsheet" className="w-4 h-4" />}
                                {vis.type === 'table' && <Icon name="file-text" className="w-4 h-4" />}
                              </span>
                              <div className="min-w-0">
                                <h4 className="text-xs font-bold text-white truncate" title={vis.title}>{vis.title}</h4>
                                <p className="text-[9px] text-slate-400 capitalize truncate">
                                  Y: {currentDataset.columns[vis.yCol]} ({vis.aggType})
                                </p>
                              </div>
                            </div>

                            {/* Chart interaction control buttons */}
                            <div className="panel-controls flex items-center space-x-1.5 text-slate-400 flex-shrink-0">
                              <button 
                                onClick={() => moveVisual(idx, 'left')} 
                                disabled={idx === 0}
                                className="p-1 rounded hover:bg-slate-700/60 hover:text-white disabled:opacity-20"
                                title="Pindah Kiri / Naik"
                              >
                                <Icon name="arrow-left" className="w-3 h-3" />
                              </button>
                              <button 
                                onClick={() => moveVisual(idx, 'right')} 
                                disabled={idx === visualizations.length - 1}
                                className="p-1 rounded hover:bg-slate-700/60 hover:text-white disabled:opacity-20"
                                title="Pindah Kanan / Turun"
                              >
                                <Icon name="arrow-right" className="w-3 h-3" />
                              </button>
                              <button 
                                onClick={() => {
                                  toggleVisualWidth(vis.id);
                                  showToastMessage("Lebar grid diubah.", "info");
                                }}
                                className="p-1 rounded hover:bg-slate-700/60 hover:text-white"
                                title="Ubah Lebar Grid"
                              >
                                <Icon name="maximize" className="w-3 h-3" />
                              </button>
                              <button 
                                onClick={() => openEditVisualEditor(vis)}
                                className="p-1 rounded hover:bg-indigo-600/20 hover:text-indigo-400"
                                title="Ubah Konfigurasi Sumbu"
                              >
                                <Icon name="settings" className="w-3 h-3" />
                              </button>
                              <button 
                                onClick={() => deleteVisualization(vis.id)}
                                className="p-1 rounded hover:bg-rose-600/20 hover:text-rose-400"
                                title="Hapus Visualisasi"
                              >
                                <Icon name="trash" className="w-3 h-3" />
                              </button>
                            </div>
                          </div>

                          {/* Rendering SVG charts programmatically... */}
                          <div className="flex-1 flex flex-col justify-center min-h-[200px]">
                            {chartData.length === 0 ? (
                              <div className="text-center py-8 text-slate-500 text-xs">
                                <Icon name="info" className="w-6 h-6 mx-auto mb-2 opacity-50" />
                                Tidak ada data untuk kombinasi filter ini.
                              </div>
                            ) : (
                              <>
                                {vis.type === 'bar' && (
                                  <div className="h-48 flex items-end space-x-3 pt-4 px-2">
                                    {chartData.map(item => {
                                      const maxVal = Math.max(...chartData.map(b => b.value)) || 1;
                                      const pct = (item.value / maxVal) * 85;
                                      const isSelected = globalFilters.dim1.toLowerCase() === item.label.toLowerCase() || globalFilters.dim2.toLowerCase() === item.label.toLowerCase() || globalFilters.dim3.toLowerCase() === item.label.toLowerCase();

                                      return (
                                        <div 
                                          key={item.label}
                                          onClick={() => handleCrossFilterToggle(vis.xCol, item.label)}
                                          className="flex-1 flex flex-col items-center group cursor-pointer"
                                        >
                                          <div className="relative w-full flex justify-center">
                                            <div className="absolute bottom-full mb-1 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-950 text-white text-[9px] px-2 py-1 rounded shadow-xl whitespace-nowrap z-10 pointer-events-none">
                                              {item.label}: {item.value.toLocaleString('id-ID')}
                                            </div>
                                            <div 
                                              style={{ height: `${Math.max(pct, 6)}%` }}
                                              className={`w-full rounded-t-md transition-all duration-300 ${isSelected ? 'ring-2 ring-white ' + scheme.bg : 'bg-slate-700 hover:' + scheme.bg}`}
                                            />
                                          </div>
                                          <span className="text-[9px] text-slate-400 mt-2 truncate w-full text-center" title={item.label}>
                                            {item.label}
                                          </span>
                                        </div>
                                      );
                                    })}
                                  </div>
                                )}

                                {vis.type === 'horizontal_bar' && (
                                  <div className="space-y-2 py-2">
                                    {chartData.map(item => {
                                      const maxVal = Math.max(...chartData.map(b => b.value)) || 1;
                                      const pct = (item.value / maxVal) * 100;
                                      const isSelected = globalFilters.dim1.toLowerCase() === item.label.toLowerCase() || globalFilters.dim2.toLowerCase() === item.label.toLowerCase() || globalFilters.dim3.toLowerCase() === item.label.toLowerCase();

                                      return (
                                        <div 
                                          key={item.label}
                                          onClick={() => handleCrossFilterToggle(vis.xCol, item.label)}
                                          className="flex flex-col space-y-1 cursor-pointer group"
                                        >
                                          <div className="flex justify-between text-[9px] text-slate-300">
                                            <span className="truncate max-w-[150px]">{item.label}</span>
                                            <span className="font-semibold">{item.value.toLocaleString('id-ID')}</span>
                                          </div>
                                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                                            <div 
                                              style={{ width: `${pct}%` }}
                                              className={`h-full rounded-full transition-all duration-300 ${isSelected ? 'ring-1 ring-white ' + scheme.bg : 'bg-slate-700 group-hover:' + scheme.bg}`}
                                            />
                                          </div>
                                        </div>
                                      );
                                    })}
                                  </div>
                                )}

                                {vis.type === 'line' && (
                                  <div className="h-48 w-full pt-4 relative">
                                    <svg viewBox="0 0 300 150" className="w-full h-full">
                                      {(() => {
                                        const maxVal = Math.max(...chartData.map(b => b.value)) || 1;
                                        const minVal = Math.min(...chartData.map(b => b.value)) || 0;
                                        const range = maxVal - minVal || 1;
                                        const points = chartData.map((item, index) => {
                                          const x = (index / (chartData.length - 1)) * 260 + 20;
                                          const y = 130 - ((item.value - minVal) / range) * 100;
                                          return { x, y, ...item };
                                        });

                                        const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                                        const areaD = points.length ? `${pathD} L ${points[points.length - 1].x} 140 L ${points[0].x} 140 Z` : '';

                                        return (
                                          <g>
                                            <line x1="10" y1="30" x2="290" y2="30" stroke="#334155" strokeDasharray="3,3" />
                                            <line x1="10" y1="80" x2="290" y2="80" stroke="#334155" strokeDasharray="3,3" />
                                            <line x1="10" y1="130" x2="290" y2="130" stroke="#334155" strokeDasharray="3,3" />
                                            <path d={areaD} fill={`${scheme.fill}15`} />
                                            <path d={pathD} fill="none" stroke={scheme.fill} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                                            {points.map((p, i) => (
                                              <g key={i} className="group cursor-pointer" onClick={() => handleCrossFilterToggle(vis.xCol, p.label)}>
                                                <circle cx={p.x} cy={p.y} r="4" fill="#0f172a" stroke={scheme.fill} strokeWidth="2.5" />
                                                <circle cx={p.x} cy={p.y} r="7" fill={scheme.fill} className="opacity-0 hover:opacity-30 transition-opacity" />
                                                <text x={p.x} y="145" fill="#94a3b8" fontSize="8" textAnchor="middle">{p.label}</text>
                                              </g>
                                            ))}
                                          </g>
                                        );
                                      })()}
                                    </svg>
                                  </div>
                                )}

                                {vis.type === 'pie' && (
                                  <div className="h-48 flex items-center justify-around">
                                    <div className="space-y-1 w-1/2 overflow-y-auto max-h-40 pr-1">
                                      {chartData.map((item, idx) => {
                                        const total = chartData.reduce((s, c) => s + c.value, 0) || 1;
                                        const pct = ((item.value / total) * 100).toFixed(1);
                                        const colors = ['#3b82f6', '#10b981', '#a855f7', '#f59e0b', '#f43f5e'];
                                        const clr = colors[idx % colors.length];

                                        return (
                                          <div 
                                            key={item.label}
                                            onClick={() => handleCrossFilterToggle(vis.xCol, item.label)}
                                            className="flex items-center space-x-2 p-1 rounded hover:bg-slate-800 cursor-pointer"
                                          >
                                            <span className="w-2 h-2 rounded-full" style={{ backgroundColor: clr }} />
                                            <div className="min-w-0">
                                              <p className="text-[9px] font-semibold text-slate-200 truncate">{item.label}</p>
                                              <p className="text-[8px] text-slate-400">{item.value} ({pct}%)</p>
                                            </div>
                                          </div>
                                        );
                                      })}
                                    </div>

                                    <div className="relative w-28 h-28 flex-shrink-0">
                                      <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                                        <circle cx="18" cy="18" r="15.915" fill="none" stroke="#1e293b" strokeWidth="4" />
                                        {(() => {
                                          let acc = 0;
                                          return chartData.map((item, idx) => {
                                            const total = chartData.reduce((s, c) => s + c.value, 0) || 1;
                                            const pct = (item.value / total) * 100;
                                            const dash = `${pct} ${100 - pct}`;
                                            const offset = 100 - acc;
                                            acc += pct;

                                            const colors = ['#3b82f6', '#10b981', '#a855f7', '#f59e0b', '#f43f5e'];
                                            const clr = colors[idx % colors.length];

                                            return (
                                              <circle
                                                key={item.label}
                                                cx="18"
                                                cy="18"
                                                r="15.915"
                                                fill="none"
                                                stroke={clr}
                                                strokeWidth="3.5"
                                                strokeDasharray={dash}
                                                strokeDashoffset={offset}
                                                className="transition-all duration-300 cursor-pointer hover:stroke-[4.5]"
                                                onClick={() => handleCrossFilterToggle(vis.xCol, item.label)}
                                              />
                                            );
                                          });
                                        })()}
                                      </svg>
                                    </div>
                                  </div>
                                )}

                                {vis.type === 'kpi' && (
                                  <div className="h-48 flex flex-col items-center justify-center text-center">
                                    {(() => {
                                      const total = chartData.reduce((s, c) => s + c.value, 0);
                                      const avg = chartData.length ? (total / chartData.length).toFixed(1) : 0;
                                      return (
                                        <div>
                                          <p className="text-xs font-semibold text-slate-400 mb-1">{vis.title}</p>
                                          <h3 className={`text-3xl font-extrabold tracking-tight ${scheme.text}`}>
                                            {total.toLocaleString('id-ID')}
                                          </h3>
                                          <p className="text-[10px] text-slate-500 mt-2">
                                            Rata-rata: {avg} | Aktif: {filteredData.length} baris
                                          </p>
                                        </div>
                                      );
                                    })()}
                                  </div>
                                )}

                                {vis.type === 'table' && (
                                  <div className="h-48 overflow-y-auto border border-slate-700/60 rounded-xl bg-slate-900/60 text-[10px] custom-scrollbar">
                                    <table className="w-full text-left border-collapse">
                                      <thead>
                                        <tr className="bg-slate-800/80 sticky top-0 border-b border-slate-700 text-slate-300">
                                          <th className="p-2 font-semibold">{currentDataset.columns[vis.xCol]}</th>
                                          <th className="p-2 font-semibold text-right">{currentDataset.columns[vis.yCol]}</th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {chartData.map((item, index) => (
                                          <tr key={index} className="border-b border-slate-800/40 hover:bg-slate-800 text-slate-200">
                                            <td className="p-2 font-medium">{item.label}</td>
                                            <td className="p-2 text-right font-bold">{item.value.toLocaleString('id-ID')}</td>
                                          </tr>
                                        ))}
                                      </tbody>
                                    </table>
                                  </div>
                                )}
                              </>
                            )}
                          </div>
                        </div>
                      );
                    })}

                  </div>

                  {/* Spreadsheet Grid */}
                  <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700/60 shadow-lg">
                    <h4 className="text-xs font-bold text-white mb-4 flex items-center gap-2">
                      <Icon name="layout-grid" className="w-4 h-4 text-indigo-400" />
                      Pratinjau Master Data ({filteredData.length} Baris Terfilter)
                    </h4>

                    <div className="overflow-x-auto max-h-56 overflow-y-auto border border-slate-700/60 rounded-xl bg-slate-900/60 custom-scrollbar">
                      <table className="w-full text-left border-collapse text-[11px]">
                        <thead>
                          <tr className="bg-slate-800 border-b border-slate-700 text-slate-300 sticky top-0">
                            {currentDataset.columns.map((col, idx) => (
                              <th key={idx} className="p-2.5 font-semibold text-slate-400">{col}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {filteredData.map((row, rIdx) => (
                            <tr key={rIdx} className="border-b border-slate-800/60 hover:bg-slate-800/40 text-slate-200">
                              {row.map((cell, cIdx) => (
                                <td key={cIdx} className="p-2.5">{typeof cell === 'number' ? cell.toLocaleString('id-ID') : cell}</td>
                              ))}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* AI Assistant Chatbot */}
                  <div className="bg-slate-800/60 rounded-2xl border border-slate-700/60 overflow-hidden shadow-xl">
                    <div className="bg-gradient-to-r from-slate-800 to-indigo-950/60 px-5 py-4 border-b border-slate-700 flex items-center justify-between">
                      <div className="flex items-center space-x-3">
                        <div className="bg-indigo-600/20 p-2 rounded-lg text-indigo-400 border border-indigo-500/30">
                          <Icon name="message-square" className="w-5 h-5" />
                        </div>
                        <div>
                          <h4 className="text-xs font-bold text-white">Gemini Conversational Analyst</h4>
                          <p className="text-[10px] text-slate-400">Ajukan korelasi statistik, audit metrik, dan analisis regresi instan</p>
                        </div>
                      </div>
                    </div>

                    <div className="p-5 h-64 overflow-y-auto space-y-4 bg-slate-900/40 flex flex-col custom-scrollbar">
                      {chatMessages.map((msg, idx) => (
                        <div key={idx} className={`flex flex-col max-w-[85%] ${msg.role === 'user' ? 'self-end items-end' : 'self-start items-start'}`}>
                          <span className="text-[9px] text-slate-500 mb-0.5 uppercase tracking-wide">{msg.role === 'user' ? 'Analis Pengguna' : 'Omni Bot'}</span>
                          <div className={`p-3 rounded-2xl text-xs leading-relaxed ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-200 rounded-tl-none border border-slate-700/50'}`}>
                            {msg.text}
                          </div>
                        </div>
                      ))}
                      {isChatLoading && (
                        <div className="self-start flex flex-col max-w-[85%]">
                          <span className="text-[9px] text-slate-500 mb-0.5">Omni Bot</span>
                          <div className="p-3 rounded-2xl text-xs bg-slate-800 text-slate-400 rounded-tl-none border border-slate-700/50 flex items-center space-x-2">
                            <Icon name="refresh" className="w-3.5 h-3.5 animate-spin text-indigo-400" />
                            <span>Menganalisis matriks silang data...</span>
                          </div>
                        </div>
                      )}
                    </div>

                    <form onSubmit={handleSendChat} className="p-3 bg-slate-900 border-t border-slate-800 flex space-x-2">
                      <input 
                        type="text"
                        value={userInput}
                        onChange={(e) => setUserInput(e.target.value)}
                        placeholder="Tanyakan tren profitabilitas, distribusi geografis, atau rencana mitigasi risiko..."
                        className="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-xs text-slate-100 focus:outline-none focus:ring-1 focus:ring-blue-500"
                      />
                      <button 
                        type="submit" 
                        disabled={isChatLoading || !userInput.trim()}
                        className="bg-blue-600 hover:bg-blue-500 text-white p-2.5 rounded-xl transition-all disabled:opacity-50"
                      >
