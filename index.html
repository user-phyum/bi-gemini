                        <Icon name="send" className="w-4 h-4" />
                      </button>
                    </form>
                  </div>

                </div>
              )}

              {/* Workspace Bottom Footer info */}
              <div className="text-center text-[10px] text-slate-600 border-t border-slate-850 pt-4 pb-2">
                © 2026 OmniInsight BI Engine • Dirancang untuk Kustomisasi Sumbu Multi-Dimensi Berkecepatan Tinggi.
              </div>

            </div>

          </main>

          {/* Visualizer Modal Panel */}
          {isEditorOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm">
              <div className="w-full max-w-lg bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden shadow-2xl">
                <div className="px-6 py-4 border-b border-slate-800 flex items-center justify-between bg-gradient-to-r from-slate-900 to-indigo-950/40">
                  <h3 className="text-xs font-bold text-white flex items-center gap-2">
                    <Icon name="sliders" className="w-4 h-4 text-blue-400" />
                    {editingVisId ? 'Ubah Properti Visual' : 'Tambah Visualisasi Baru'}
                  </h3>
                  <button onClick={() => setIsEditorOpen(false)} className="text-slate-400 hover:text-white p-1 rounded-lg">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <div className="p-6 space-y-4">
                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1">Judul Panel Visualisasi</label>
                    <input 
                      type="text" 
                      value={editorState.title}
                      onChange={(e) => setEditorState(p => ({ ...p, title: e.target.value }))}
                      className="w-full bg-slate-950 border border-slate-700 rounded-xl py-2 px-3 text-xs text-slate-100 focus:outline-none focus:ring-1 focus:ring-blue-500"
                    />
                  </div>

                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1">Tipe Grafik Tableau / Power BI</label>
                    <select 
                      value={editorState.type}
                      onChange={(e) => setEditorState(p => ({ ...p, type: e.target.value }))}
                      className="w-full bg-slate-950 border border-slate-700 rounded-xl py-2 px-3 text-xs text-slate-100 focus:outline-none focus:ring-1 focus:ring-blue-500"
                    >
                      <option value="bar">Vertical Bar Chart</option>
                      <option value="horizontal_bar">Horizontal Bar Chart</option>
                      <option value="line">Line Trend Chart</option>
                      <option value="pie">Pie Donut Chart</option>
                      <option value="kpi">KPI Summary Card</option>
                      <option value="table">Data Summary Table</option>
                    </select>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] text-slate-400 block mb-1">Sumbu X (Dimensi Label)</label>
                      <select 
                        value={editorState.xCol}
                        onChange={(e) => setEditorState(p => ({ ...p, xCol: parseInt(e.target.value) }))}
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl py-2 px-3 text-xs text-slate-100 focus:outline-none"
                      >
                        {currentDataset.columns.map((col, idx) => (
                          <option key={idx} value={idx}>{col}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-400 block mb-1">Sumbu Y (Metrik Angka)</label>
                      <select 
                        value={editorState.yCol}
                        onChange={(e) => setEditorState(p => ({ ...p, yCol: parseInt(e.target.value) }))}
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl py-2 px-3 text-xs text-slate-100 focus:outline-none"
                      >
                        {currentDataset.columns.map((col, idx) => (
                          <option key={idx} value={idx}>{col}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1">Metode Agregasi Metrik</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button 
                        onClick={() => setEditorState(p => ({ ...p, aggType: 'sum' }))}
                        className={`py-1.5 rounded-xl text-xs font-semibold border ${editorState.aggType === 'sum' ? 'bg-blue-600/20 border-blue-500 text-blue-300' : 'bg-slate-950 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                      >
                        SUM (Total Akumulatif)
                      </button>
                      <button 
                        onClick={() => setEditorState(p => ({ ...p, aggType: 'avg' }))}
                        className={`py-1.5 rounded-xl text-xs font-semibold border ${editorState.aggType === 'avg' ? 'bg-blue-600/20 border-blue-500 text-blue-300' : 'bg-slate-950 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                      >
                        AVG (Nilai Rata-rata)
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1.5">Skema Warna & Tema Panel</label>
                    <div className="flex space-x-3">
                      {['indigo', 'emerald', 'purple', 'amber', 'rose'].map(clr => (
                        <button 
                          key={clr} 
                          onClick={() => setEditorState(p => ({ ...p, palette: clr }))}
                          className={`w-7 h-7 rounded-full border-2 transition-transform ${editorState.palette === clr ? 'scale-125 ring-1 ring-white' : ''}`}
                          style={{
                            backgroundColor: clr === 'indigo' ? '#6366f1' : clr === 'emerald' ? '#10b981' : clr === 'purple' ? '#a855f7' : clr === 'amber' ? '#f59e0b' : '#f43f5e'
                          }}
                          title={clr}
                        />
                      ))}
                    </div>
                  </div>
                </div>

                <div className="px-6 py-4 bg-slate-950 border-t border-slate-800/80 flex justify-end space-x-2">
                  <button 
                    onClick={() => setIsEditorOpen(false)}
                    className="bg-slate-850 hover:bg-slate-800 text-slate-300 px-4 py-2 rounded-xl text-xs font-semibold"
                  >
                    Batal
                  </button>
                  <button 
                    onClick={saveVisualSettings}
                    className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-xs font-semibold shadow"
                  >
                    Terapkan Ke Canvas
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Mount to the root DOM
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
